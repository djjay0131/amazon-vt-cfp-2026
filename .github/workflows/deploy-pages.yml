name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-latex-recommended latexmk poppler-utils > /dev/null 2>&1

      - name: Build abstract PDFs
        run: |
          echo "## Abstract Builds" >> $GITHUB_STEP_SUMMARY
          for dir in abstract abstract_v2 abstract_v3 abstract_v4; do
            if [ -f "${dir}/main.tex" ]; then
              cd "${dir}"
              pdflatex -interaction=nonstopmode main.tex > /dev/null 2>&1 || true
              bibtex main > /dev/null 2>&1 || true
              pdflatex -interaction=nonstopmode main.tex > /dev/null 2>&1 || true
              pdflatex -interaction=nonstopmode main.tex > /dev/null 2>&1 || true
              PAGES=$(pdfinfo main.pdf 2>/dev/null | grep Pages | awk '{print $2}' || echo "?")
              echo "- **${dir}**: ${PAGES} page(s)" >> $GITHUB_STEP_SUMMARY
              if [ "$PAGES" != "1" ] && [ "$PAGES" != "2" ]; then
                echo "::warning::${dir} is ${PAGES} pages"
              fi
              cd ..
            fi
          done

      - name: Publish PDFs to docs
        run: |
          [ -f abstract/main.pdf ]    && cp abstract/main.pdf    docs/abstract.pdf
          [ -f abstract_v2/main.pdf ] && cp abstract_v2/main.pdf docs/abstract_v2.pdf
          [ -f abstract_v3/main.pdf ] && cp abstract_v3/main.pdf docs/abstract_v3.pdf
          [ -f abstract_v4/main.pdf ] && cp abstract_v4/main.pdf docs/abstract_v4.pdf
          true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

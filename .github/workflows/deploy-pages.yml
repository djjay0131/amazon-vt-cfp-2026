name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-latex-recommended latexmk > /dev/null 2>&1

      - name: Build abstract PDF
        run: |
          cd abstract
          make
          echo "## Abstract Build" >> $GITHUB_STEP_SUMMARY
          PAGES=$(pdfinfo main.pdf 2>/dev/null | grep Pages | awk '{print $2}' || echo "?")
          echo "- Pages: ${PAGES}" >> $GITHUB_STEP_SUMMARY
          if [ "$PAGES" != "1" ]; then
            echo "::warning::Abstract is ${PAGES} pages (limit: 1)"
          fi

      - name: Publish PDF to docs
        run: |
          cp abstract/main.pdf docs/abstract.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
